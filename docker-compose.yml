services:

  # ── PostgreSQL + PostGIS ─────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4-alpine   # PostGIS 내장 공식 이미지
    container_name: location_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       location_sharing
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data   # 데이터 영속성
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d location_sharing"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: location_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass redis1234
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis1234", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Commander (선택: 웹 GUI) ───────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: location_redis_ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379:0:redis1234
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
